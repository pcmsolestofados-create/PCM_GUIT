<!DOCTYPE html>
<html lang="pt-BR">
<head>
    </head>
<body>
<div class="app">
    </div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// CONFIGURAÇÃO DO FIREBASE (Substitua pelos seus dados do console)
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  databaseURL: "https://SEU_PROJETO.firebaseio.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "ID",
  appId: "APP_ID"
};

// Inicializa o Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── Mapeamento de colunas original ──────────────────────
const COL = {
  NUM: 0, DATA: 1, HORA: 2, SOL: 4, SETOR: 6, EQUIP: 7,
  FALHA: 25, TIPO: 29, SERVICO: 30, PECA: 31,
  TECNICO: 41, STATUS: 42
};

let OS = [];
let osFilter = 'Todos';
let dashTab  = 'Todas';
let currentPage = 'upload';

// ── Lógica para SALVAR NO SITE (Banco de Dados) ──────────
function salvarNoBanco(csvText, fileName) {
  setSyncBadge('idle', 'Salvando no site...');
  db.ref('dados_manutencao').set({
    csv: csvText,
    nome: fileName,
    dataUpload: new Date().toISOString()
  }).then(() => {
    setSyncBadge('ok', 'Salvo no Site');
  }).catch(err => {
    console.error(err);
    setSyncBadge('err', 'Erro ao salvar');
  });
}

// ── Lógica para CARREGAR DO SITE AUTOMATICAMENTE ───────
function carregarDadosDoSite() {
  setSyncBadge('idle', 'Sincronizando...');
  db.ref('dados_manutencao').once('value', (snapshot) => {
    const data = snapshot.val();
    if (data && data.csv) {
      OS = parseCSV(data.csv);
      onDataLoaded(data.nome);
    } else {
      setSyncBadge('idle', 'Aguardando CSV');
    }
  });
}

// ── Seu Parser e Funções de Renderização Originais ──────
const $ = id => document.getElementById(id);
const setText = (id, v) => { const el = $(id); if(el) el.textContent = v; };

function parseCSV(text) {
  const sep = text.split('\n')[1]?.includes(';') ? ';' : ',';
  const lines = text.split('\n').map(l => l.split(sep).map(c => c.trim().replace(/^"|"$/g,'')));
  const dataStart = lines[1]?.[0]?.toLowerCase().includes('nº') ? 2 : 1;

  return lines.slice(dataStart).filter(r => r.length > 5 && r[COL.NUM]).map(r => ({
    n: r[COL.NUM], data: r[COL.DATA], hora: r[COL.HORA],
    setor: r[COL.SETOR], equip: r[COL.EQUIP], falha: r[COL.FALHA],
    tipo: r[COL.TIPO], servico: r[COL.SERVICO], tecnico: (r[COL.TECNICO]||'').trim(),
    status: r[COL.STATUS] || 'Aberta'
  }));
}

function handleFile(file) {
  if (!file || !file.name.endsWith('.csv')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const csvText = e.target.result;
    OS = parseCSV(csvText);
    if (OS.length) {
      salvarNoBanco(csvText, file.name); // Salva no Firebase
      onDataLoaded(file.name);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

// ... (Restante das suas funções de renderização: renderDashboard, renderOS, etc.) ...

// ── Inicialização ──────────────────────────────────────
window.addEventListener('DOMContentLoaded', carregarDadosDoSite);

// Eventos de clique mantidos conforme seu padrão
['csv-input-side','csv-input-top','csv-input-dz'].forEach(id => {
  $(id)?.addEventListener('change', e => handleFile(e.target.files[0]));
});
// (Adicione aqui todos os seus outros event listeners de navegação)
</script>
</body>
</html>
