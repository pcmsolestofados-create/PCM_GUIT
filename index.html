<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
// ════════════════════════════════════════════════════════════════════════
// CONFIGURAÇÃO FIREBASE
// ════════════════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ════════════════════════════════════════════════════════════════════════
// ESTADO GLOBAL E FIREBASE
// ════════════════════════════════════════════════════════════════════════
let OS = [];
let osFilter = 'Todos';
let dashTab  = 'Todas';
let currentPage = 'upload';
let fbReady = false;

// ════════════════════════════════════════════════════════════════════════
// HELPERS (MANTÉM OS ORIGINAIS)
// ════════════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const setText = (id, v) => { const el = $(id); if(el) el.textContent = v; };
const groupBy = (arr, fn) => { const m={}; arr.forEach(x=>{ const k=fn(x)||'—'; m[k]=(m[k]||0)+1; }); return m; };
const sorted  = obj => Object.entries(obj).sort((a,b)=>b[1]-a[1]);
const count   = (arr, fn) => arr.filter(fn).length;
const isCor   = x => (x.tipo||'').toLowerCase().includes('corretiva');
const isPrev  = x => (x.tipo||'').toLowerCase().includes('preventiva');

function badgeTipo(x) {
  return isCor(x)
    ? '<span class="badge b-cor">Corretiva</span>'
    : '<span class="badge b-prev">Preventiva</span>';
}
function badgeStatus(s) {
  const m = {'Concluída':'b-conc','Em andamento':'b-and','Aberta':'b-ab','Urgente':'b-urg'};
  return `<span class="badge ${m[s]||'b-ab'}">${s||'—'}</span>`;
}

// ════════════════════════════════════════════════════════════════════════
// FUNÇÕES FIREBASE
// ════════════════════════════════════════════════════════════════════════

/**
 * Inicia listeners do Firebase ao carregar a página
 */
function initFirebaseListeners() {
  if (fbReady) return;
  fbReady = true;

  // Reference para os dados de OS
  const osRef = db.ref('sol-estofados/os-data');

  // Carregar dados iniciais e ouvir mudanças
  osRef.on('value', snapshot => {
    const data = snapshot.val();
    if (data && data.os && Array.isArray(data.os) && data.os.length > 0) {
      OS = data.os;
      onDataLoadedFromCloud(data.fileName || 'backup-cloud.csv', data.timestamp);
      console.log('✅ Dados carregados da nuvem:', OS.length, 'OS');
    } else {
      console.log('ℹ️ Nenhum dado na nuvem ainda');
    }
  }, error => {
    console.error('❌ Erro ao carregar do Firebase:', error);
    setSyncBadge('err', 'Erro na sincronização');
  });
}

/**
 * Salva os dados parseados no Firebase
 */
function saveToFirebase(osData, fileName) {
  setSyncBadge('idle', 'Sincronizando...');

  const timestamp = new Date().toISOString();
  const dataToSave = {
    os: osData,
    fileName: fileName,
    timestamp: timestamp,
    count: osData.length,
  };

  db.ref('sol-estofados/os-data').set(dataToSave)
    .then(() => {
      setSyncBadge('ok', `${osData.length} OS sincronizadas`);
      console.log('✅ Dados salvos no Firebase');
    })
    .catch(error => {
      setSyncBadge('err', 'Erro ao sincronizar');
      console.error('❌ Erro ao salvar no Firebase:', error);
      // Mantém os dados localmente mesmo se falhar
      alert('Aviso: Dados salvos localmente, mas houve erro na sincronização:\n' + error.message);
    });
}

/**
 * Chamado quando dados são carregados da nuvem
 */
function onDataLoadedFromCloud(fileName, timestamp) {
  if (OS.length === 0) return;

  $('data-info').style.display = 'block';
  const ts = new Date(timestamp).toLocaleString('pt-BR');
  $('data-info-text').innerHTML = 
    `<strong>${OS.length} OS</strong> sincronizadas<br>` +
    `<small style="color:rgba(255,255,255,0.5);">${ts}</small>`;

  // Se estava na página de upload, vai pro dashboard
  if (currentPage === 'upload') navigateTo('dashboard');
  else renderCurrentPage();
}

/**
 * Limpar dados da nuvem (para teste/reset)
 */
function clearCloudData() {
  if (!confirm('Tem certeza que deseja limpar os dados da nuvem?')) return;
  db.ref('sol-estofados/os-data').remove()
    .then(() => {
      OS = [];
      setSyncBadge('idle', 'Aguardando CSV');
      $('data-info').style.display = 'none';
      navigateTo('upload');
      alert('Dados da nuvem removidos com sucesso');
    })
    .catch(err => alert('Erro ao limpar: ' + err.message));
}

// ════════════════════════════════════════════════════════════════════════
// PARSER CSV (MANTÉM O ORIGINAL)
// ════════════════════════════════════════════════════════════════════════
const COL = {
  NUM:      0,   // Nº OS
  DATA:     1,   // Data
  HORA:     2,   // Hora
  SOL:      4,   // Solicitante
  SETOR:    6,   // Setor
  EQUIP:    7,   // Equipamento
  FALHA:    25,  // Falha apresentada
  TIPO:     29,  // Intervenção Realizada
  SERVICO:  30,  // Serviço Realizado
  PECA:     31,  // Peças reparadas
  SEG:      32,  // Segurança
  TECNICO:  41,  // Técnico
  STATUS:   42,  // Status da OS
};

function parseCSV(text) {
  // detecta separador
  const sep = text.split('\n')[1]?.includes(';') ? ';' : ',';
  const lines = text.split('\n').map(l => l.split(sep).map(c => c.trim().replace(/^"|"$/g,'')));

  // pula linha 1 (título) e linha 2 (cabeçalho)
  const dataStart = lines[1]?.[0]?.toLowerCase().includes('nº') || lines[1]?.[0]?.toLowerCase().includes('n°') ? 2 : 1;

  return lines.slice(dataStart).filter(r => r.length > 5 && r[COL.NUM]).map(r => ({
    n:       r[COL.NUM]     || '',
    data:    r[COL.DATA]    || '',
    hora:    r[COL.HORA]    || '',
    sol:     r[COL.SOL]     || '',
    setor:   r[COL.SETOR]   || '',
    equip:   r[COL.EQUIP]   || '',
    falha:   r[COL.FALHA]   || '',
    tipo:    r[COL.TIPO]    || '',
    servico: r[COL.SERVICO] || '',
    peca:    r[COL.PECA]    || '',
    tecnico: (r[COL.TECNICO]||'').trim(),
    status:  r[COL.STATUS]  || 'Aberta',
  }));
}

// ════════════════════════════════════════════════════════════════════════
// CARREGAMENTO DE ARQUIVO (MODIFICADO PARA SALVAR NO FIREBASE)
// ════════════════════════════════════════════════════════════════════════
function handleFile(file) {
  if (!file || !file.name.endsWith('.csv')) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      OS = parseCSV(e.target.result);
      if (!OS.length) throw new Error('Nenhuma OS encontrada');
      
      // ✅ NOVO: Salvar no Firebase
      saveToFirebase(OS, file.name);
      
    } catch(err) {
      setSyncBadge('err', 'Erro no arquivo');
      alert('Erro ao ler o CSV: ' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function onDataLoaded(filename) {
  setSyncBadge('ok', `${OS.length} OS carregadas`);
  $('data-info').style.display = 'block';
  $('data-info-text').innerHTML = `<strong>${OS.length} OS</strong> carregadas<br>${filename}`;

  // Se estava na página de upload, vai pro dashboard
  if (currentPage === 'upload') navigateTo('dashboard');
  else renderCurrentPage();
}

// ════════════════════════════════════════════════════════════════════════
// NAVEGAÇÃO (MANTÉM O ORIGINAL)
// ════════════════════════════════════════════════════════════════════════
function navigateTo(page) {
  if (!OS.length && page !== 'upload') { navigateTo('upload'); return; }
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-page]').forEach(n => n.classList.remove('active'));
  $(`page-${page}`)?.classList.add('active');
  document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
  const titles = {upload:'Importar CSV',dashboard:'Dashboard',ordens:'Ordens de Serviço',historico:'Histórico por Equipamento',tecnicos:'Técnicos',relatorios:'Relatórios'};
  setText('page-title', titles[page]||page);
  renderCurrentPage();
}

function renderCurrentPage() {
  const r = {dashboard:renderDashboard,ordens:renderOS,historico:renderHistorico,tecnicos:renderTecnicos,relatorios:renderRelatorios};
  r[currentPage]?.();
}

function setSyncBadge(type, msg) {
  const el = $('sync-badge');
  el.className = `sync-badge ${type}`;
  el.textContent = msg;
}

// ════════════════════════════════════════════════════════════════════════
// DASHBOARD (MANTÉM O ORIGINAL)
// ════════════════════════════════════════════════════════════════════════
function renderDashboard() {
  const total = OS.length;
  const conc  = count(OS, x => x.status === 'Concluída');
  const cor   = count(OS, isCor);
  const prev  = count(OS, isPrev);
  setText('kpi-total', total);
  setText('kpi-conc', conc);
  setText('kpi-conc-pct', `${Math.round(conc/total*100)}% do total`);
  setText('kpi-cor', cor);
  setText('kpi-cor-pct', `${Math.round(cor/total*100)}% do total`);
  setText('kpi-prev', prev);
  setText('kpi-prev-pct', `${Math.round(prev/total*100)}% do total`);
  renderDashTable();
  renderBar('setor-chart',   sorted(groupBy(OS, x=>x.setor)).slice(0,6),   '#2563EB');
  renderBar('tecnico-chart', sorted(groupBy(OS, x=>x.tecnico)).slice(0,5), '#1D4ED8');
  renderTimeline();
  renderBar('peca-chart',    sorted(groupBy(OS, x=>x.peca)).slice(0,5),    '#D97706');
  renderStatusChart();
}

function renderDashTable() {
  let data = OS.slice().reverse();
  if (dashTab === 'Corretiva')  data = data.filter(isCor);
  if (dashTab === 'Preventiva') data = data.filter(isPrev);
  data = data.slice(0, 10);
  $('dash-tbody').innerHTML = data.map(x => `<tr>
    <td class="os-num">#${x.n}</td>
    <td style="white-space:nowrap">${x.data}</td>
    <td>${x.setor}</td>
    <td class="truncate" style="max-width:120px" title="${x.equip}">${x.equip}</td>
    <td>${badgeTipo(x)}</td>
    <td>${x.tecnico}</td>
    <td>${badgeStatus(x.status)}</td>
  </tr>`).join('') || '<tr><td colspan="7" class="empty">Sem dados</td></tr>';
}

function renderBar(id, data, color) {
  const el = $(id); if(!el||!data.length) return;
  const max = data[0][1];
  el.innerHTML = data.map(([label,val]) => `
    <div class="bar-row">
      <div class="bar-label" title="${label}">${label||'—'}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/max*100)}%;background:${color}"></div></div>
      <div class="bar-val">${val}</div>
    </div>`).join('');
}

function renderTimeline() {
  const colors = {'Concluída':'#16A34A','Em andamento':'#D97706','Aberta':'#2563EB'};
  const recent = OS.slice().reverse().slice(0,6);
  $('timeline').innerHTML = recent.map((x,i) => `
    <div class="tl-item">
      <div class="tl-dot-col">
        <div class="tl-dot" style="background:${colors[x.status]||'#2563EB'}"></div>
        ${i<5?'<div class="tl-line"></div>':''}
      </div>
      <div>
        <div class="tl-title">OS #${x.n} — ${x.equip}</div>
        <div class="tl-time">${x.data} ${x.hora} · ${x.tecnico||'—'}</div>
      </div>
    </div>`).join('');
}

function renderStatusChart() {
  const g = groupBy(OS, x => x.status);
  const colors = {'Concluída':'#16A34A','Em andamento':'#D97706','Aberta':'#2563EB','Urgente':'#DC2626'};
  const max = Math.max(...Object.values(g));
  $('status-chart').innerHTML = sorted(g).map(([label,val]) => `
    <div class="bar-row">
      <div class="bar-label">${label||'—'}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/max*100)}%;background:${colors[label]||'#6B7280'}"></div></div>
      <div class="bar-val">${val}</div>
    </div>`).join('');
}

// ════════════════════════════════════════════════════════════════════════
// ORDENS DE SERVIÇO (MANTÉM O ORIGINAL)
// ════════════════════════════════════════════════════════════════════════
function renderOS() {
  const search = ($('os-search')?.value||'').toLowerCase();
  let data = OS.slice().reverse();
  if (osFilter !== 'Todos') {
    if (osFilter==='Corretiva')  data = data.filter(isCor);
    else if (osFilter==='Preventiva') data = data.filter(isPrev);
    else data = data.filter(x => x.status === osFilter);
  }
  if (search) data = data.filter(x =>
    [x.n, x.equip, x.setor, x.tecnico, x.falha, x.servico].some(f=>(f||'').toLowerCase().includes(search)));

  $('os-tbody').innerHTML = data.map(x => `<tr>
    <td class="os-num">#${x.n}</td>
    <td style="white-space:nowrap">${x.data}</td>
    <td>${x.setor}</td>
    <td class="truncate" style="max-width:130px" title="${x.equip}">${x.equip}</td>
    <td class="truncate" style="max-width:130px" title="${x.falha}">${x.falha}</td>
    <td>${badgeTipo(x)}</td>
    <td class="truncate" style="max-width:180px" title="${x.servico}">${x.servico}</td>
    <td>${x.tecnico||'—'}</td>
    <td>${badgeStatus(x.status)}</td>
  </tr>`).join('') || '<tr><td colspan="9" class="empty">Nenhuma OS encontrada</td></tr>';

  setText('os-count', `Mostrando ${data.length} de ${OS.length} ordens de serviço`);
  setText('os-total-badge', `${OS.length} OS`);
}

// ════════════════════════════════════════════════════════════════════════
// HISTÓRICO (MANTÉM O ORIGINAL)
// ════════════════════════════════════════════════════════════════════════
function renderHistorico() {
  const search = ($('hist-search')?.value||'').toLowerCase();
  const grupos = {};
  OS.forEach(x => { if(!grupos[x.equip]) grupos[x.equip]=[]; grupos[x.equip].push(x); });
  let keys = Object.keys(grupos).sort();
  if (search) keys = keys.filter(k => k.toLowerCase().includes(search));

  const el = $('hist-content');
  if (!keys.length) { el.innerHTML='<div class="empty">Nenhum equipamento encontrado</div>'; return; }
  el.innerHTML = keys.map(k => {
    const os = grupos[k];
    return `<div style="border-bottom:1px solid var(--border)">
      <div class="hist-group-header">
        <span class="hist-group-name">${k}</span>
        <span class="hist-group-meta">${os.length} OS · ${os[0].setor}</span>
      </div>
      <div class="tbl-wrap"><table><thead><tr><th>OS</th><th>Data</th><th>Tipo</th><th>Serviço realizado</th><th>Técnico</th><th>Status</th></tr></thead>
      <tbody>${os.map(x=>`<tr>
        <td class="os-num">#${x.n}</td>
        <td style="white-space:nowrap">${x.data}</td>
        <td>${badgeTipo(x)}</td>
        <td class="truncate" style="max-width:240px" title="${x.servico}">${x.servico}</td>
        <td>${x.tecnico||'—'}</td>
        <td>${badgeStatus(x.status)}</td>
      </tr>`).join('')}</tbody></table></div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════════════════
// TÉCNICOS (MANTÉM O ORIGINAL)
// ════════════════════════════════════════════════════════════════════════
function renderTecnicos() {
  const tecs = {};
  OS.forEach(x => {
    const t = (x.tecnico||'—').trim();
    if(!tecs[t]) tecs[t]={total:0,cor:0,prev:0,conc:0,aberto:0};
    tecs[t].total++;
    if(isCor(x)) tecs[t].cor++; else tecs[t].prev++;
    if(x.status==='Concluída') tecs[t].conc++;
    else tecs[t].aberto++;
  });
  const entries = sorted(groupBy(OS, x=>(x.tecnico||'—').trim()));

  $('tec-kpis').innerHTML = entries.slice(0,4).map(([tec,val]) => `
    <div class="kpi"><div class="kpi-bar" style="background:#2563EB"></div>
    <div class="kpi-label">${tec}</div>
    <div class="kpi-val">${val}</div>
    <div class="kpi-sub">OS realizadas</div></div>`).join('');

  $('tec-tbody').innerHTML = entries.map(([tec]) => {
    const t = tecs[tec];
    return `<tr>
      <td style="font-weight:700">${tec}</td>
      <td>${t.total}</td><td>${t.cor}</td><td>${t.prev}</td>
      <td><span class="badge b-conc">${t.conc}</span></td>
      <td>${t.aberto>0?`<span class="badge b-ab">${t.aberto}</span>`:'—'}</td>
    </tr>`;
  }).join('');
  renderBar('tec-chart', entries, '#1D4ED8');
}

// ════════════════════════════════════════════════════════════════════════
// RELATÓRIOS (MANTÉM O ORIGINAL)
// ════════════════════════════════════════════════════════════════════════
function renderRelatorios() {
  const setores = sorted(groupBy(OS, x=>x.setor));
  const equips  = sorted(groupBy(OS, x=>x.equip));
  const pecas   = sorted(groupBy(OS, x=>x.peca));
  const tipos   = sorted(groupBy(OS, x=>x.tipo));
  const total   = OS.length;

  $('rel-setores').innerHTML = setores.slice(0,10).map(([k,v]) =>
    `<div class="stat-pill"><span class="stat-name">${k}</span><span class="stat-count">${v}</span></div>`).join('');
  $('rel-equip').innerHTML = equips.slice(0,10).map(([k,v]) =>
    `<div class="stat-pill"><span class="stat-name">${k}</span><span class="stat-count">${v}</span></div>`).join('');
  $('rel-pecas').innerHTML = pecas.slice(0,8).map(([k,v]) =>
    `<div class="stat-pill"><span class="stat-name">${k}</span><span class="stat-count">${v}</span></div>`).join('');
  $('rel-tbody').innerHTML = tipos.map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td><td>${Math.round(v/total*100)}%</td></tr>`).join('');
}

// ════════════════════════════════════════════════════════════════════════
// EVENTOS (COM MELHORIAS)
// ════════════════════════════════════════════════════════════════════════

// Navegação sidebar
document.querySelectorAll('.nav-item[data-page]').forEach(item =>
  item.addEventListener('click', () => navigateTo(item.dataset.page)));

// Links "Ver todos" / "Gerenciar"
document.querySelectorAll('[data-goto]').forEach(el =>
  el.addEventListener('click', () => navigateTo(el.dataset.goto)));

// Inputs de arquivo
['csv-input-side','csv-input-top','csv-input-dz'].forEach(id => {
  $(id)?.addEventListener('change', e => handleFile(e.target.files[0]));
});

// Drag & Drop na drop zone
const dz = $('drop-zone');
if(dz) {
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag');
    handleFile(e.dataTransfer.files[0]);
  });
}

// Dashboard tabs
document.querySelectorAll('#dash-tabs .tab').forEach(tab =>
  tab.addEventListener('click', () => {
    document.querySelectorAll('#dash-tabs .tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    dashTab = tab.dataset.filter || 'Todas';
    renderDashTable();
  }));

// OS filters
document.querySelectorAll('#os-filters .filter-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('#os-filters .filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    osFilter = btn.dataset.filter || 'Todos';
    renderOS();
  }));

// Search inputs
$('os-search')?.addEventListener('input', renderOS);
$('hist-search')?.addEventListener('input', renderHistorico);

// ════════════════════════════════════════════════════════════════════════
// INICIALIZAÇÃO AO CARREGAR A PÁGINA
// ════════════════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  console.log('🚀 Aplicação iniciada...');
  try {
    initFirebaseListeners();
  } catch(err) {
    console.error('❌ Erro ao inicializar Firebase:', err);
    setSyncBadge('err', 'Firebase não disponível');
  }
});

</script>
