<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Manutenção</title>
<style>
body{font-family:Arial;background:#f0f2f5;margin:0}
.top{background:#111;color:#fff;padding:10px;display:flex;gap:10px;align-items:center}
button{padding:6px 10px;cursor:pointer}
.container{padding:20px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:8px;border-bottom:1px solid #ddd;font-size:12px}
</style>
</head>

<body>

<div class="top">
  <input type="file" id="file" accept=".csv">
  <button onclick="limpar()">Limpar Dados</button>
  <span id="status">Aguardando CSV</span>
</div>

<div class="container">
  <h3>Total de OS: <span id="total">0</span></h3>

  <table>
    <thead>
      <tr>
        <th>OS</th>
        <th>Data</th>
        <th>Setor</th>
        <th>Equipamento</th>
        <th>Técnico</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script>
// ─── CONFIG COLUNAS ───
const COL = {
  NUM:0, DATA:1, SETOR:6, EQUIP:7, TEC:41, STATUS:42
};

let OS = [];

// ─── PARSE CSV ───
function parseCSV(text){
  const sep = text.includes(';') ? ';' : ',';
  const linhas = text.split('\n').map(l=>l.split(sep));

  return linhas.slice(2).map(r=>({
    n:r[COL.NUM],
    data:r[COL.DATA],
    setor:r[COL.SETOR],
    equip:r[COL.EQUIP],
    tec:r[COL.TEC],
    status:r[COL.STATUS]||'Aberta'
  })).filter(x=>x.n);
}

// ─── RENDER ───
function render(){
  document.getElementById('total').textContent = OS.length;

  document.getElementById('tabela').innerHTML =
    OS.map(x=>`
      <tr>
        <td>#${x.n}</td>
        <td>${x.data}</td>
        <td>${x.setor}</td>
        <td>${x.equip}</td>
        <td>${x.tec}</td>
        <td>${x.status}</td>
      </tr>
    `).join('');
}

// ─── SALVAR ───
function salvar(){
  localStorage.setItem('os_data', JSON.stringify(OS));
}

// ─── CARREGAR ───
function carregar(){
  const data = localStorage.getItem('os_data');
  if(data){
    OS = JSON.parse(data);
    render();
    document.getElementById('status').textContent = OS.length + ' OS carregadas';
  }
}

// ─── LIMPAR ───
function limpar(){
  if(confirm('Apagar dados?')){
    localStorage.clear();
    location.reload();
  }
}

// ─── UPLOAD ───
document.getElementById('file').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev=>{
    OS = parseCSV(ev.target.result);

    salvar();
    render();

    document.getElementById('status').textContent =
      OS.length + ' OS carregadas';
  };
  reader.readAsText(file);
});

// ─── INIT ───
window.onload = carregar;
</script>

</body>
</html>
