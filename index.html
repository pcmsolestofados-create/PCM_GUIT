<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sol Estofados — Sistema</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

.sidebar{
  width:220px;
  background:#111;
  color:#fff;
  height:100vh;
  position:fixed;
  padding:20px;
}

.sidebar h2{
  font-size:16px;
}

.menu{
  margin-top:20px;
}

.menu div{
  padding:10px;
  cursor:pointer;
}

.menu div:hover{
  background:#333;
}

.main{
  margin-left:220px;
  padding:20px;
}

.card{
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
}

button{
  padding:10px;
  cursor:pointer;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:5px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:left;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Sol Estofados</h2>

  <div class="menu">
    <div onclick="showPage('upload')">Importar</div>
    <div onclick="showPage('dashboard')">Dashboard</div>
    <div onclick="showPage('os')">Ordens</div>
  </div>
</div>

<div class="main">

  <!-- UPLOAD -->
  <div id="upload">
    <div class="card">
      <h3>Importar CSV</h3>
      <input type="file" id="file">
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none">
    <div class="card">
      <h3>Total de OS</h3>
      <h1 id="total">0</h1>
    </div>

    <div class="card">
      <h3>Concluídas</h3>
      <h1 id="conc">0</h1>
    </div>
  </div>

  <!-- OS -->
  <div id="os" style="display:none">
    <div class="card">
      <h3>Ordens de Serviço</h3>
      <table>
        <thead>
          <tr>
            <th>OS</th>
            <th>Equipamento</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>
  </div>

</div>

<script>

let dados = [];

// trocar página
function showPage(p){
  document.getElementById("upload").style.display="none";
  document.getElementById("dashboard").style.display="none";
  document.getElementById("os").style.display="none";

  document.getElementById(p).style.display="block";
}

// ler arquivo
document.getElementById("file").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    try{
      processCSV(e.target.result);
      showPage("dashboard");
    }catch(err){
      alert("Erro no CSV");
      console.error(err);
    }
  };

  reader.readAsText(file);
});

function processCSV(text){

  const linhas = text.split("\n").map(l => l.split(";"));

  dados = linhas.slice(1).filter(l => l.length > 3).map(l => ({
    os: l[0],
    equip: l[7],
    status: l[42]
  }));

  atualizar();
}

function atualizar(){

  document.getElementById("total").innerText = dados.length;

  const concluidas = dados.filter(d => d.status === "Concluída").length;
  document.getElementById("conc").innerText = concluidas;

  // tabela
  const tbody = document.getElementById("tabela");

  tbody.innerHTML = dados.map(d => `
    <tr>
      <td>${d.os}</td>
      <td>${d.equip || "-"}</td>
      <td>${d.status || "-"}</td>
    </tr>
  `).join("");
}

</script>

</body>
</html>
