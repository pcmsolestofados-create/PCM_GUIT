<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sol Estofados — Sistema de Manutenção</title>
</head>
<body>
<script>

// =============================
// ESTADO GLOBAL
// =============================
let OS = [];

// =============================
// PARSER CSV
// =============================
function parseCSV(text) {
  const sep = text.split('\n')[1]?.includes(';') ? ';' : ',';
  const lines = text.split('\n').map(l => l.split(sep).map(c => c.trim()));

  return lines.slice(1).filter(r => r[0]).map(r => ({
    n: r[0],
    data: r[1],
    setor: r[6],
    equip: r[7],
    falha: r[25],
    tipo: r[29],
    servico: r[30],
    tecnico: r[41],
    status: r[42] || 'Aberta'
  }));
}

// =============================
// SALVAR NO "SITE"
// =============================
function salvarDados() {
  localStorage.setItem('os_data', JSON.stringify(OS));
}

// =============================
// CARREGAR AUTOMÁTICO
// =============================
function carregarDados() {
  const saved = localStorage.getItem('os_data');
  if (saved) {
    try {
      OS = JSON.parse(saved);
      console.log('Dados restaurados:', OS.length);
    } catch (e) {
      console.error('Erro ao restaurar dados');
    }
  }
}

// =============================
// LIMPAR DADOS
// =============================
function limparDados() {
  if (confirm('Deseja apagar todos os dados salvos?')) {
    localStorage.removeItem('os_data');
    location.reload();
  }
}

// =============================
// UPLOAD CSV
// =============================
function handleFile(file) {
  if (!file || !file.name.endsWith('.csv')) return;

  const reader = new FileReader();
  reader.onload = e => {
    OS = parseCSV(e.target.result);

    if (OS.length) {
      salvarDados();
      alert(OS.length + ' OS carregadas e salvas!');
    } else {
      alert('Erro ao ler CSV');
    }
  };
  reader.readAsText(file);
}

// =============================
// EVENTOS
// =============================
window.addEventListener('load', () => {
  carregarDados();
});

</script>

<input type="file" accept=".csv" onchange="handleFile(this.files[0])">
<button onclick="limparDados()">Limpar Dados</button>

</body>
</html>
