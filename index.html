<script>
// ── Mapeamento de colunas ──────────────────────────────────────────────
const COL = {
  NUM:0, DATA:1, HORA:2, SOL:4, SETOR:6, EQUIP:7,
  FALHA:25, TIPO:29, SERVICO:30, PECA:31,
  TECNICO:41, STATUS:42,
};

// ── Estado ─────────────────────────────────────────────────────────────
let OS = [];
let osFilter = 'Todos';
let dashTab  = 'Todas';
let currentPage = 'upload';

// ── Helpers ────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const setText = (id,v)=>{ if($(id)) $(id).textContent=v };
const groupBy = (arr,fn)=>{const m={};arr.forEach(x=>{const k=fn(x)||'—';m[k]=(m[k]||0)+1});return m};
const sorted=o=>Object.entries(o).sort((a,b)=>b[1]-a[1]);
const count=(arr,fn)=>arr.filter(fn).length;
const isCor=x=>(x.tipo||'').toLowerCase().includes('corretiva');
const isPrev=x=>(x.tipo||'').toLowerCase().includes('preventiva');

// ── CSV ────────────────────────────────────────────────────────────────
function parseCSV(text){
  const sep = text.includes(';') ? ';' : ',';
  const lines = text.split('\n').map(l=>l.split(sep).map(c=>c.trim().replace(/^"|"$/g,'')));

  return lines.slice(2).filter(r=>r.length>5 && r[0]).map(r=>({
    n:r[COL.NUM]||'',
    data:r[COL.DATA]||'',
    hora:r[COL.HORA]||'',
    setor:r[COL.SETOR]||'',
    equip:r[COL.EQUIP]||'',
    falha:r[COL.FALHA]||'',
    tipo:r[COL.TIPO]||'',
    servico:r[COL.SERVICO]||'',
    peca:r[COL.PECA]||'',
    tecnico:(r[COL.TECNICO]||'').trim(),
    status:r[COL.STATUS]||'Aberta'
  }));
}

// ── SALVAR ─────────────────────────────────────────────────────────────
function salvarLocal(){
  localStorage.setItem('os_data', JSON.stringify(OS));
}

// ── CARREGAR ───────────────────────────────────────────────────────────
function carregarLocal(){
  const data = localStorage.getItem('os_data');
  if(data){
    OS = JSON.parse(data);
    if(OS.length){
      setSyncBadge('ok', `${OS.length} OS carregadas`);
      navigateTo('dashboard');
    }
  }
}

// ── LIMPAR ─────────────────────────────────────────────────────────────
function limparDados(){
  if(confirm('Deseja apagar os dados salvos?')){
    localStorage.clear();
    location.reload();
  }
}

// ── Upload ─────────────────────────────────────────────────────────────
function handleFile(file){
  if(!file || !file.name.endsWith('.csv')) return;

  const reader = new FileReader();
  reader.onload = e=>{
    OS = parseCSV(e.target.result);

    if(!OS.length){
      alert('CSV inválido');
      return;
    }

    salvarLocal();
    setSyncBadge('ok', `${OS.length} OS carregadas`);
    navigateTo('dashboard');
  };
  reader.readAsText(file);
}

// ── Navegação ──────────────────────────────────────────────────────────
function navigateTo(page){
  if(!OS.length && page!=='upload'){navigateTo('upload');return;}

  currentPage = page;

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  $(`page-${page}`).classList.add('active');
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');

  render();
}

// ── Badge ──────────────────────────────────────────────────────────────
function setSyncBadge(type,msg){
  const el=$('sync-badge');
  el.className=`sync-badge ${type}`;
  el.textContent=msg;
}

// ── Render geral ───────────────────────────────────────────────────────
function render(){
  if(currentPage==='dashboard') renderDashboard();
  if(currentPage==='ordens') renderOS();
}

// ── Dashboard ──────────────────────────────────────────────────────────
function renderDashboard(){
  setText('kpi-total', OS.length);
  setText('kpi-conc', count(OS,x=>x.status==='Concluída'));
  setText('kpi-cor', count(OS,isCor));
  setText('kpi-prev', count(OS,isPrev));
}

// ── OS ─────────────────────────────────────────────────────────────────
function renderOS(){
  let data = OS.slice().reverse();

  $('os-tbody').innerHTML = data.map(x=>`
    <tr>
      <td>#${x.n}</td>
      <td>${x.data}</td>
      <td>${x.setor}</td>
      <td>${x.equip}</td>
      <td>${x.falha}</td>
      <td>${x.tipo}</td>
      <td>${x.servico}</td>
      <td>${x.tecnico}</td>
      <td>${x.status}</td>
    </tr>
  `).join('');
}

// ── Eventos ────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(i=>{
  i.addEventListener('click',()=>navigateTo(i.dataset.page));
});

['csv-input-side','csv-input-top','csv-input-dz'].forEach(id=>{
  $(id)?.addEventListener('change',e=>handleFile(e.target.files[0]));
});

// ── Inicialização ──────────────────────────────────────────────────────
window.onload = ()=>{
  carregarLocal();
};
</script>
