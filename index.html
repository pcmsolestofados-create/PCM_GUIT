<script>
// ── CONFIGURAÇÃO ──────────────────────────────────────────────────────
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-dtFO4D4MrpI2QcL9dTPlSCp5aeQtAlStDYIDkaewPHjcbZgj1wz0ln4wcGWGUSEMtkUZsRyjGHI8/pub?gid=1091192334&single=true&output=csv';
const SHEET_EDIT_URL = 'https://docs.google.com/spreadsheets/d/1OeAHhSAxX_ZcTqA2ZxR0V1B_PN8Z2qwxJaxH86UQGVQ/edit?gid=114888676#gid=114888676';
const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfQBUkaWl5gUqxcgDWs5Xk33K4ZDo2oqOgbFWUu_suXFIGrIQ/viewform?pli=1&pli=1';

const COL = {
  NUM_OS:0,    // A
  DATA:1,      // B
  SOLICITANTE:2, // C
  SETOR:3,     // D
  EQUIPAMENTO:4, // E
  FALHA:5,    // F
  INTERVENCAO:6, // G
  SERVICO:7,  // H
  TECNICO:8,  // I
  STATUS:9,   // J
};

let OS = [], osFilter = 'Todos', dashTab = 'Todas', currentPage = 'dashboard';

const $ = id => document.getElementById(id);
const setText = (id, v) => { const el = $(id); if(el) el.textContent = v; };
const groupBy = (arr, fn) => { const m={}; arr.forEach(x=>{ const k=fn(x)||'—'; m[k]=(m[k]||0)+1; }); return m; };
const sorted  = obj => Object.entries(obj).sort((a,b)=>b[1]-a[1]);
const count   = (arr, fn) => arr.filter(fn).length;
const isCorretiva   = x => (x.intervencao||'').toLowerCase().includes('corretiva');
const isPreventiva  = x => (x.intervencao||'').toLowerCase().includes('preventiva');

function openForm() { window.open(FORM_URL, '_blank'); }
function goToSheet() { window.open(SHEET_EDIT_URL, '_blank'); }

async function loadGoogleSheets() {
  try {
    setSyncBadge('syncing', 'Sincronizando...');
    const response = await fetch(SHEET_URL);
    const csvText = await response.text();
    OS = parseCSV(csvText);
    if (!OS.length) throw new Error('Nenhuma OS encontrada');
    setSyncBadge('ok', `${OS.length} OS carregadas`);
    updateStorageInfo();
    updateSidebarStats();
    showPage('dashboard');
    renderCurrentPage();
  } catch (error) {
    console.error('❌ Erro:', error);
    setSyncBadge('err', 'Erro ao carregar dados');
    alert('Erro ao conectar com Google Sheets: ' + error.message);
  }
}

function parseCSV(text) {
  const sep = text.split('\n')[0]?.includes(';') ? ';' : ',';
  const lines = text.split('\n').map(l => l.split(sep).map(c => c.trim().replace(/^"|"$/g,'')));
  return lines.slice(1)
    .filter(r => r.length > 5 && r[COL.NUM_OS] && r[COL.NUM_OS].trim())
    .map(r => ({
      numOS:r[COL.NUM_OS]?.trim() || '', data:r[COL.DATA]?.trim() || '',
      solicitante:r[COL.SOLICITANTE]?.trim() || '', setor:r[COL.SETOR]?.trim() || '',
      equipamento:r[COL.EQUIPAMENTO]?.trim() || '', falha:r[COL.FALHA]?.trim() || '',
      intervencao:r[COL.INTERVENCAO]?.trim() || '', servico:r[COL.SERVICO]?.trim() || '',
      tecnico:r[COL.TECNICO]?.trim() || '', status:r[COL.STATUS]?.trim() || 'Aberta',
      hora:'', pecas:'', seguranca:'', indicacaoSeg:'', colaborador:'',
    }));
}

function updateStorageInfo() {
  if (OS.length > 0) {
    const timestamp = new Date().toLocaleString('pt-BR');
    $('data-info').style.display = 'block';
    $('data-info-text').innerHTML = `<strong>${OS.length} OS</strong> carregadas<br>Atualizado: ${timestamp}`;
    $('sync-indicator').style.display = 'none';
  }
}

function updateSidebarStats() {
  const total = OS.length;
  const conc = count(OS, x => x.status === 'Concluída');
  setText('sb-total', total);
  setText('sb-conc', conc);
}

function setSyncBadge(type, msg) {
  const el = $('sync-badge');
  if(el) { el.className = `sync-badge ${type}`; el.textContent = msg; }
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-page]').forEach(n => n.classList.remove('active'));
  $(`page-${page}`)?.classList.add('active');
  document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
  const titles = {dashboard:'Dashboard', ordens:'Ordens de Serviço', historico:'Histórico', tecnicos:'Técnicos', relator_
