<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordens de Serviço</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .filter-section {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        label {
            font-weight: 600;
            color: #555;
        }
        
        input, select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 10px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        thead {
            background: #667eea;
            color: white;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #ddd;
        }
        
        td {
            padding: 12px 15px;
            border: 1px solid #eee;
        }
        
        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }
        
        tbody tr:hover {
            background: #f0f0f0;
        }
        
        .status {
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: 600;
            text-align: center;
        }
        
        .status.concluido {
            background: #d4edda;
            color: #155724;
        }
        
        .status.pendente {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.em-progresso {
            background: #cfe2ff;
            color: #084298;
        }
        
        .acoes {
            display: flex;
            gap: 8px;
        }
        
        .btn-editar, .btn-deletar {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: opacity 0.3s;
        }
        
        .btn-editar {
            background: #ffc107;
            color: white;
        }
        
        .btn-deletar {
            background: #dc3545;
            color: white;
        }
        
        .btn-editar:hover, .btn-deletar:hover {
            opacity: 0.8;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: #000;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
        }
        
        .sem-dados {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Ordens de Serviço</h1>
        
        <div class="filter-section">
            <div class="filter-group">
                <label>Filtrar por Status:</label>
                <select id="filterStatus">
                    <option value="">Todos</option>
                    <option value="Concluído">Concluído</option>
                    <option value="Pendente">Pendente</option>
                    <option value="Em Progresso">Em Progresso</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Filtrar por Técnico:</label>
                <input type="text" id="filterTecnico" placeholder="Digite o nome do técnico">
            </div>
            
            <div class="filter-group">
                <label>Filtrar por Setor:</label>
                <input type="text" id="filterSetor" placeholder="Digite o setor">
            </div>
            
            <button onclick="aplicarFiltros()">🔍 Filtrar</button>
            <button onclick="limparFiltros()">🔄 Limpar Filtros</button>
            <button onclick="novaOS()" style="background: #28a745;">➕ Nova OS</button>
        </div>
        
        <div class="table-wrapper">
            <table id="tabelaOS">
                <thead>
                    <tr>
                        <th>Nº OS</th>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Solicitante</th>
                        <th>Setor</th>
                        <th>Equipamento</th>
                        <th>Falha</th>
                        <th>Intervenção</th>
                        <th>Serviço</th>
                        <th>Peças</th>
                        <th>Segurança</th>
                        <th>Indicação Seg.</th>
                        <th>Colaborador</th>
                        <th>Técnico</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                </tbody>
            </table>
            <div id="semDados" class="sem-dados">Nenhuma ordem de serviço encontrada</div>
        </div>
    </div>
    
    <!-- Modal para Editar -->
    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal('modalEditar')">&times;</span>
            <h2>Editar Ordem de Serviço</h2>
            <form id="formEditar">
                <div class="form-group">
                    <label>Nº OS:</label>
                    <input type="text" id="editNum" readonly>
                </div>
                <div class="form-group">
                    <label>Técnico:</label>
                    <input type="text" id="editTecnico" required>
                </div>
                <div class="form-group">
                    <label>Status:</label>
                    <select id="editStatus" required>
                        <option value="Concluído">Concluído</option>
                        <option value="Pendente">Pendente</option>
                        <option value="Em Progresso">Em Progresso</option>
                    </select>
                </div>
                <button type="submit">Salvar Alterações</button>
            </form>
        </div>
    </div>
    
    <script>
        const INDICES = {
            NUM: 0,      // A - Nº OS
            DATA: 1,     // B - Data
            HORA: 2,     // C - Hora
            SOL: 3,      // D - Solicitante
            SETOR: 4,    // E - Setor
            EQUIP: 5,    // F - Equipamento
            FALHA: 6,    // G - Falha apresentada
            TIPO: 7,     // H - Intervenção Realizada
            SERVICO: 8,  // I - Serviço Realizado
            PECA: 9,     // J - Peças reparadas
            SEG: 10,     // K - Segurança do equipamento
            SEG_INDIC: 11, // L - Indicação de segurança
            COLAB: 12,   // M - Nome do colaborador
            TECNICO: 13, // N - Técnico ← CORRIGIDO PARA 13
            STATUS: 14   // O - Status da Ordens de serviço
        };
        
        let dadosOS = [];
        let osEditando = null;
        
        // Simular dados do banco de dados
        function carregarDados() {
            dadosOS = [
                ['OS001', '2024-01-15', '08:00', 'João Silva', 'Produção', 'CNC-001', 'Ruído anormal', 'Ajuste', 'Alinhamento do eixo', 'Mancal', 'OK', 'Sem risco', 'Pedro Santos', 'Carlos Oliveira', 'Concluído'],
                ['OS002', '2024-01-16', '09:30', 'Maria Costa', 'Manutenção', 'PRENSA-02', 'Vazamento', 'Reparo', 'Troca de vedação', 'Anel de vedação', 'OK', 'Sem risco', 'Ana Paula', 'Roberto Lima', 'Em Progresso'],
                ['OS003', '2024-01-17', '10:15', 'Lucas Ferreira', 'Montagem', 'TORNO-03', 'Não inicia', 'Diagnóstico', 'Teste eletrônico', 'Nenhuma', 'Crítico', 'Parar máquina', 'Fernanda Silva', 'Gustavo Reis', 'Pendente'],
                ['OS004', '2024-01-18', '14:00', 'Carla Sousa', 'Produção', 'FRESA-04', 'Aquecimento', 'Limpeza', 'Limpeza interna', 'Filtro', 'OK', 'Sem risco', 'Bruno Costa', 'Marcelo Torres', 'Concluído'],
                ['OS005', '2024-01-19', '11:45', 'Daniela Rocha', 'Logística', 'EMPILHADEIRA', 'Pneu furado', 'Reparo', 'Troca de pneu', 'Pneu 10x3', 'OK', 'Sem risco', 'Thiago Alves', 'Felipe Martins', 'Pendente']
            ];
            carregarTabela();
        }
        
        function carregarTabela() {
            const tabela = document.getElementById('corpoTabela');
            const semDados = document.getElementById('semDados');
            
            if (dadosOS.length === 0) {
                tabela.innerHTML = '';
                semDados.style.display = 'block';
                return;
            }
            
            semDados.style.display = 'none';
            tabela.innerHTML = dadosOS.map((os, index) => `
                <tr>
                    <td>${os[INDICES.NUM]}</td>
                    <td>${os[INDICES.DATA]}</td>
                    <td>${os[INDICES.HORA]}</td>
                    <td>${os[INDICES.SOL]}</td>
                    <td>${os[INDICES.SETOR]}</td>
                    <td>${os[INDICES.EQUIP]}</td>
                    <td>${os[INDICES.FALHA]}</td>
                    <td>${os[INDICES.TIPO]}</td>
                    <td>${os[INDICES.SERVICO]}</td>
                    <td>${os[INDICES.PECA]}</td>
                    <td>${os[INDICES.SEG]}</td>
                    <td>${os[INDICES.SEG_INDIC]}</td>
                    <td>${os[INDICES.COLAB]}</td>
                    <td><strong>${os[INDICES.TECNICO]}</strong></td>
                    <td>
                        <span class="status ${os[INDICES.STATUS].toLowerCase().replace(' ', '-')}">
                            ${os[INDICES.STATUS]}
                        </span>
                    </td>
                    <td>
                        <div class="acoes">
                            <button class="btn-editar" onclick="abrirEdicao(${index})">✏️ Editar</button>
                            <button class="btn-deletar" onclick="deletarOS(${index})">🗑️ Deletar</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        function aplicarFiltros() {
            const status = document.getElementById('filterStatus').value;
            const tecnico = document.getElementById('filterTecnico').value.toLowerCase();
            const setor = document.getElementById('filterSetor').value.toLowerCase();
            
            dadosOS = dadosOS.filter(os => {
                const statusMatch = !status || os[INDICES.STATUS] === status;
                const tecnicoMatch = !tecnico || os[INDICES.TECNICO].toLowerCase().includes(tecnico);
                const setorMatch = !setor || os[INDICES.SETOR].toLowerCase().includes(setor);
                
                return statusMatch && tecnicoMatch && setorMatch;
            });
            
            carregarTabela();
        }
        
        function limparFiltros() {
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterTecnico').value = '';
            document.getElementById('filterSetor').value = '';
            carregarDados();
        }
        
        function abrirEdicao(index) {
            osEditando = index;
            const os = dadosOS[index];
            document.getElementById('editNum').value = os[INDICES.NUM];
            document.getElementById('editTecnico').value = os[INDICES.TECNICO];
            document.getElementById('editStatus').value = os[INDICES.STATUS];
            document.getElementById('modalEditar').style.display = 'block';
        }
        
        function fecharModal(id) {
            document.getElementById(id).style.display = 'none';
        }
        
        document.getElementById('formEditar').addEventListener('submit', function(e) {
            e.preventDefault();
            dadosOS[osEditando][INDICES.TECNICO] = document.getElementById('editTecnico').value;
            dadosOS[osEditando][INDICES.STATUS] = document.getElementById('editStatus').value;
            fecharModal('modalEditar');
            carregarTabela();
        });
        
        function deletarOS(index) {
            if (confirm('Tem certeza que deseja deletar esta OS?')) {
                dadosOS.splice(index, 1);
                carregarTabela();
            }
        }
        
        function novaOS() {
            alert('Função de nova OS a ser implementada');
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('modalEditar');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
        
        // Carregar dados ao iniciar
        carregarDados();
    </script>
</body>
</html>
